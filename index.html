<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
    linear-gradient(135deg, #020617, #111827, #030712);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.vault-app {
  width: 92%;
  max-width: 440px;
  height: 90vh;
  max-height: 780px;
  border-radius: 32px;
  background: rgba(15, 23, 42, 0.95);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 30px 90px rgba(0,0,0,0.65);
  overflow: hidden;
  position: relative;
}

.start-screen {
  position: absolute;
  inset: 0;
  z-index: 5;
  background:
    radial-gradient(circle at center, rgba(192,132,252,0.25), transparent 35%),
    linear-gradient(135deg, #111827, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 28px;
  text-align: center;
  transition: 0.8s ease;
}

.start-screen.hide {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

.vault-door {
  width: 230px;
  height: 230px;
  margin: 0 auto 25px;
  border-radius: 50%;
  background:
    radial-gradient(circle, #475569 0 18%, #1e293b 19% 38%, #020617 39% 100%);
  border: 12px solid #334155;
  box-shadow:
    inset 0 0 35px rgba(255,255,255,0.12),
    0 0 50px rgba(192,132,252,0.25);
  position: relative;
}

.vault-door::before,
.vault-door::after {
  content: "";
  position: absolute;
  background: #94a3b8;
  border-radius: 999px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.vault-door::before {
  width: 150px;
  height: 12px;
}

.vault-door::after {
  width: 12px;
  height: 150px;
}

.start-screen h1 {
  margin: 0;
  font-size: 30px;
}

.start-screen p {
  color: #cbd5e1;
  line-height: 1.7;
  font-size: 14px;
}

button {
  border: none;
  cursor: pointer;
  font-weight: 800;
  transition: 0.25s ease;
}

.open-btn {
  margin-top: 16px;
  padding: 14px 25px;
  border-radius: 999px;
  background: linear-gradient(135deg, #f9a8d4, #c084fc);
  color: #111827;
  box-shadow: 0 12px 35px rgba(192,132,252,0.35);
}

.open-btn:hover {
  transform: translateY(-2px);
}

.header {
  padding: 20px;
  background: rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.09);
}

.header small {
  color: #94a3b8;
}

.header h2 {
  margin: 5px 0 0;
  font-size: 22px;
}

.letter {
  height: calc(100% - 82px);
  overflow-y: auto;
  padding: 24px;
  scroll-behavior: smooth;
}

.paper {
  display: none;
  padding: 22px;
  border-radius: 24px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.13);
  box-shadow: inset 0 0 40px rgba(255,255,255,0.03);
  animation: fadeIn 0.8s ease forwards;
}

.paper.show {
  display: block;
}

#letterText {
  white-space: pre-line;
  line-height: 1.85;
  font-size: 15px;
  color: #e5e7eb;
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 18px;
  background: #f9a8d4;
  margin-left: 3px;
  animation: blink 0.8s infinite;
}

.final-box {
  display: none;
  margin-top: 22px;
  padding: 18px;
  border-radius: 20px;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.3);
  color: #bbf7d0;
  line-height: 1.8;
  animation: fadeIn 0.8s ease forwards;
}

.question-btn {
  display: none;
  width: 58px;
  height: 58px;
  margin: 20px auto 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f9a8d4, #c084fc);
  color: #111827;
  font-size: 28px;
  box-shadow: 0 12px 35px rgba(192,132,252,0.35);
}

.note {
  display: none;
  color: #94a3b8;
  text-align: center;
  font-size: 13px;
  line-height: 1.6;
}

.video-box {
  display: none;
  margin-top: 18px;
  animation: fadeIn 0.8s ease forwards;
}

.video-box video {
  width: 100%;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.15);
}

@keyframes blink {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 480px) {
  .vault-app {
    width: 94%;
    height: 92vh;
    border-radius: 26px;
  }

  .vault-door {
    width: 200px;
    height: 200px;
  }

  #letterText {
    font-size: 14px;
  }

  .letter {
    padding: 18px;
  }
}
</style>
</head>

<body>

<div class="vault-app">

  <div class="start-screen" id="startScreen">
    <div>
      <div class="vault-door"></div>
      <h1>The Vault</h1>
      <p>
        Some feelings are not deleted.<br>
        They are just stored somewhere safe.
      </p>
      <button class="open-btn" onclick="openVault()">Open Vault</button>
    </div>
  </div>

  <div class="header">
    <small>Private Archive • For You Only</small>
    <h2>Last Project For Now</h2>
  </div>

  <div class="letter" id="letter">
    <div class="paper" id="paper">
      <span id="letterText"></span><span class="cursor" id="cursor"></span>

      <div class="final-box" id="finalBox">
        Vault Status:<br><br>
        ✓ Feelings stored<br>
        ✓ Not deleted<br>
        ✓ Not forgotten<br><br>
        Just kept safe for now.
      </div>

      <button class="question-btn" id="questionBtn" onclick="openVideo()">?</button>

      <div class="note" id="note">
        One last thing before the vault closes.
      </div>

      <div class="video-box" id="videoBox">
        <video id="secretVideo" controls>
          <source src="yes.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </div>

</div>

<script>
const text = `This isn't really a goodbye.

I don't think I could write one even if I tried.

It's more like me putting something away for a while.

For years, I've liked you.

Long enough for it to become part of my routine.

Long enough that making these little projects somehow became normal.

And lately, I've noticed things feel different.

Not bad.

Not dramatic.

Just quieter.

Maybe that's life.

Maybe we're both busy.

Maybe conversations naturally drift sometimes.

Whatever the reason is, I don't want to force anything.

So instead of continuing to send messages just because I'm afraid of disappearing, I think I'm going to do something unusual.

I'm going to put these feelings back in the vault.

Not because they're gone.

Not because you've become less important to me.

And definitely not because I've suddenly stopped admiring you.

If anything, you've meant enough to me that I'd rather preserve what I feel than slowly wear it down chasing conversations that aren't happening naturally.

There is something slightly embarrassing that I should probably admit.

I liked you so much that, I constantly check you new repost on instagram and your shared post on FB, I even found your tiktok, And you actually started appearing in my dreams.

Which is honestly a very bad sign.

Not for you.

For me.

Because that's when I realized this crush had gotten way worse and more serious than I originally intended.

You might think this is a cowardly decision.

Maybe part of it is.

But I genuinely believe it's the right thing for me to do.

I'd rather explain myself honestly than suddenly disappear from our chats without a word and leave you wondering what happened.

People call that ghosting.

I don't want to do that to you.

And besides—

I refuse to get ghosted.

That's why I'm doing this in advance.

HAHA.

Jokes on you.

Okay, maybe that's not the actual reason.

But it sounded funny in my head.

Please don't take this letter as a joke.

A lot of the projects I made were filled with jokes.

A lot of the messages I sent were filled with jokes.

But my feelings for you were never a joke.

Not once.

I don't know what your reaction is while reading this.

Maybe you're surprised.

Maybe you're confused.

Maybe you're wondering:

"Couple of years passed... and you're only making a move now?"

Honestly, that's a fair question.

Let's just say it might be in our bloodline.

My older brother confessed to the girl he loved only after graduating from college and getting a proper job.

Today, she's his wife.

I'm not saying history is going to repeat itself.

I'm just saying my family apparently has a habit of taking the scenic route.

You know what's funny?

It's only been 33 days since we first started talking through chat.

Honestly, that's not exactly an impressive number.

Especially when compared to the years I've spent quietly liking you.

The truth is, I've never really liked getting to know someone through Messenger.

Maybe it's just me, but chats always feel temporary.

Messages get buried.

Conversations slow down.

People get busy.

And eventually things fade.

I've always wanted to talk more in person.

Not because I'm particularly good at conversations.

I'm probably just as awkward in real life.

But because it feels more genuine.

Which is why I was genuinely happy when you invited me to that nature trip.

Not because of the destination.

Not because of the photos.

And definitely not because I automatically say yes whenever someone mentions an outing or swimming.

Although that's also true.

I was happy because I thought I might finally get the chance to know you a little better.

Not through notifications.

Not through chat bubbles.

But as an actual person sitting right in front of me.

For once, I thought I had a chance to spend time with you naturally.

And honestly?

I was really looking forward to it.

Then the earthquake happened.

Which remains one of the most creative ways the universe has ever found to ruin my plans.

Out of all the possible reasons for something to get cancelled, "an actual earthquake" wasn't exactly on my bingo card.

So yeah.

That sucked.

There was something else I never told you, Its not worth telling anyways.

Even though some of my friends warned me not to pursue my feelings for you, I never really listened.

One of them even told me,

"Ayaw na sya mic Inosente ra kaayo ka para niya, Mic, Type baya niya kay mga naay car."

And honestly?

I just smiled.

Not because I thought they were wrong.

Not because I thought they were right either.

I just knew that, after liking someone for this long, I wasn't going to let other people's opinions decide how I felt.

Besides, if I've already survived for couple of years of this crush, a few warnings from my friends weren't exactly going to stop me.

Before I end this, there is one thing I want to say.

Yes, I still remember the Book and additional a bracelet maybe?.

The one I'm supposed to give you.

I haven't forgotten about it.

I will just have to wait until you have some free time.

I think it deserves to be given properly instead of during some random rushed moment.

So don't worry.

It's still yours.

Just delayed.

Kind of like this confession, apparently.

This letter is exclusively for you.

I know I can't control what happens after you read it.

But if possible, I'd appreciate it if you kept it between us.

Not because there's anything bad in it.

But because some things feel more meaningful when they're not shared with everyone else.

I'm not writing this because I expect anything.

I'm not asking for an answer.

But for now the projects are going on a break.

The letters are going on a break.

The overthinking on some of your notes and stories is hopefully going on a break too.

This isn't the end of the story.

It's just the end of this chapter just as the same as novel and your favorite wattpad stories.

Maybe one day I'll come back with better timing.

More confidence.

And hopefully fewer embarrassing HTML projects.

Until then,

Thank you.

For the conversations.

For the laughs.

For the inspiration behind far more coding projects than any reasonable person should have created.

The vault is closing for now.

But the contents aren't going anywhere.

This is not a promise, doing promises sucks and i hate that shit just like the people who borrowed money to you and promise to pay you tomorrow which a big lie.`;

let index = 0;

function openVault() {
  document.getElementById("startScreen").classList.add("hide");

  setTimeout(() => {
    document.getElementById("paper").classList.add("show");
    typeText();
  }, 800);
}

function typeText() {
  const letterText = document.getElementById("letterText");
  const letter = document.getElementById("letter");

  if (index < text.length) {
    letterText.textContent += text.charAt(index);
    letter.scrollTop = letter.scrollHeight;

    let speed = 28;

    if (text.charAt(index) === ".") speed = 180;
    if (text.charAt(index) === ",") speed = 100;
    if (text.charAt(index) === "\n") speed = 120;

    index++;
    setTimeout(typeText, speed);
  } else {
    document.getElementById("cursor").style.display = "none";

    setTimeout(() => {
      document.getElementById("finalBox").style.display = "block";
      document.getElementById("questionBtn").style.display = "block";
      document.getElementById("note").style.display = "block";
      letter.scrollTop = letter.scrollHeight;
    }, 800);
  }
}

function openVideo() {
  const videoBox = document.getElementById("videoBox");
  const video = document.getElementById("secretVideo");
  const letter = document.getElementById("letter");

  videoBox.style.display = "block";
  letter.scrollTop = letter.scrollHeight;
  video.play();
}
</script>

</body>
</html>
